name: Daily Bilibili Podcast Radar

on:
  schedule:
    - cron: "20 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: bilibili-pages-update
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Update data
        run: npm run update-data
        env:
          BILI_PAGES_PER_QUERY: 1
          BILI_CHANNEL_LIMIT: 180
          BILI_REQUEST_DELAY_MS: 2500
          BILI_BAN_COOLDOWN_MS: 20000
          BILI_MIN_FRESH_VIDEOS: 80
          BILI_COOKIE: ${{ secrets.BILI_COOKIE }}

      - name: Print data summary
        run: node -e "const d=require('./public/data/site-data.json'); console.log(JSON.stringify({date:d.date,generatedAt:d.generatedAt,minDurationMinutes:d.source.minDurationMinutes,videos:d.metrics.videos,channels:d.metrics.channels,lengthBuckets:d.summaries.lengthBuckets}, null, 2))"

      - name: Commit data snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): update bilibili podcast snapshot"
          file_pattern: "data/history/*.json public/data/site-data.json public/data/site-data.js"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
